<html>
  <head>
    <script src="https://code.iconify.design/2/2.2.1/iconify.min.js"></script>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="index.css" />
  </head>
  <body class="contact-page">
    <main id="main">
      <!-- Form section -->
      <section class="contact-form-section">
        <form>
          <h2 class="contact-form-heading">Sign up</h2>
          <p class="contact-form-intro">
            Enter your contact information, and then there will be cake. 🍰
          </p>
          <label for="user-name">Name:</label>
          <input
            id="user-name"
            name="user-name"
            class="contact-input"
            type="text"
            placeholder="Sameer"
          />
          <label for="user-address">Address:</label>
          <input
            id="user-address"
            name="user-address"
            class="contact-input"
            type="text"
            placeholder="Street No. 4"
          />
          <div class="address">
            <div class="city">
              <label for="user-city">City:</label>
              <input
                id="user-city"
                name="user-city"
                class="address-input"
                type="text"
                placeholder="New York"
              />
            </div>
            <div class="postcode">
              <label for="user-postcode">Postcode:</label>
              <input
                id="user-postcode"
                name="user-postcode"
                class="address-input"
                type="text"
                placeholder="140802"
              />
            </div>
          </div>
          <label for="user-email">Email Address:</label>
          <input
            id="user-email"
            name="user-email"
            class="contact-input"
            type="text"
            placeholder="example@email.com"
          />
          <fieldset class="radio-container">
            <legend>Do you have cats?</legend>
            <label for="yes">Yes</label>
            <input class="contact-radio" id="yes" type="radio" name="cats" />
            <label for="no">No</label>
            <input class="contact-radio" id="no" type="radio" name="cats" />
          </fieldset>
          <button class="contact-submit-button" type="button">
            Send message 🎉
          </button>
          <button type="button">Click Me</button>
          <div
            role="button"
            tabindex="0"
            aria-label="Click Me"
            onclick="customButtonClickHandler()"
          >
            Click Me
          </div>
        </form>
        <img
          class="contact-image"
          src="images/drone-contact.png"
          alt="A woman seeing a drone approaching."
        />
      </section>
    </main>
  </body>
</html>
